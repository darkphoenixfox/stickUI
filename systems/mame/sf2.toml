# StickUI – Per-game config for Street Fighter II (sf2)
# ============================================================

[game]
logo = "sf2.png"

[display]
button_color        = "#dc2626"
button_border_color = "#fca5a5"

# SF2 6-button mapping:
#   Top row:    LP    MP    HP    —
#   Bottom row: LK    MK    HK    —
[buttons]
b1 = "Light Punch"
b2 = "Medium Punch"
b3 = "Heavy Punch"
b4 = "Unused"
b5 = "Ligh Kick"
b6 = "Medium Kick"
b7 = "Heavy Kick"
b8 = "Unused"
select = ""
start  = ""