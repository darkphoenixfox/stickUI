# StickUI – SNES system config
# ============================================================

[system]
name        = "Super Nintendo"
description = "Nintendo SNES / Super Famicom"
logo        = "logo.png"
background  = "background.png"
stick       = "default"

[display]
button_color        = "#8b5cf6"
button_label_color  = "#ffffff"
button_border_color = "#a78bfa"
stick_color         = "#1e1b4b"
panel_color         = "#111827"

[directions]
up    = "Up"
down  = "Down"
left  = "Left"
right = "Right"

[buttons]
# Meta (top of panel)
select = "Select"
start  = "Start"
# Main 8 buttons
# Top row:    Y  X  L  R
# Bottom row: B  A  —  —
b1 = "Y"
b2 = "X"
b3 = "L"
b4 = "R"
b5 = "B"
b6 = "A"
b7 = ""
b8 = ""