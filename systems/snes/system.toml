# StickUI – SNES system config (European colour scheme)
# ============================================================
# European SNES button colours:
#   Y = Yellow   X = Light Blue   A = Red   B = Green
#   L / R = Dark grey (shoulder)
#   Select / Start = Dark grey
# ============================================================

[system]
name        = "Super Nintendo"
description = "Nintendo SNES / Super Famicom"
logo        = "logo.png"
background  = "background.png"
stick       = "default"
logos_dir   = ""         # path to folder containing game logo images

[display]
# Panel background and stick colour
panel_color  = "#111827"
stick_color  = "#1e1b4b"

# Default button colours (overridden per-button below)
button_color        = "#888888"
button_label_color  = "#ffffff"
button_border_color = "#aaaaaa"

[directions]
up    = "Up"
down  = "Down"
left  = "Left"
right = "Right"

# ── Button labels and individual colours ────────────────────
# Each button can have its own color / border via [button_colors]

[buttons]
select = "Select"
start  = "Start"
b1 = "Y"
b2 = "X"
b3 = "L"
b4 = "R"
b5 = "B"
b6 = "A"
b7 = ""
b8 = ""

# Per-button colour overrides
# select / start use the default grey
[button_colors]
b1 = { color = "#d4a017", border = "#f0c040" }   # Y — Yellow
b2 = { color = "#5ba4cf", border = "#89c4e8" }   # X — Light Blue
b3 = { color = "#555555", border = "#888888" }   # L — Dark Grey
b4 = { color = "#555555", border = "#888888" }   # R — Dark Grey
b5 = { color = "#2e8b3e", border = "#4ab85e" }   # B — Green
b6 = { color = "#c0392b", border = "#e05040" }   # A — Red